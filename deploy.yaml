---
version: "2.0"

endpoints:
  proof-ip:
    kind: ip

services:
  pomerium:
    image: pomerium/pomerium:v0.32.8
    expose:
      - port: 443
        as: 443
        proto: tcp
        to:
          - global: true
            ip: proof-ip
    env:
      - POMERIUM_ZERO_TOKEN=replace-with-pomerium-cluster-token
      - XDG_CACHE_HOME=/var/cache

  proof-agent:
    image: ghcr.io/kewinzaq1/proof-agent:pomerium-akash-v6
    expose:
      - port: 8787
        to:
          - service: pomerium
    env:
      - ZERO_CAPABILITY_ID=cap_MqjItdttzo4ViiV9uBkZC
      - PROOF_WEB_ORIGIN=https://proof-personal-experiments.kewinszlezingier.chatgpt.site
      - REQUIRE_POMERIUM=true
      - TRUST_POMERIUM_PROXY=true

profiles:
  compute:
    pomerium:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 256Mi
        storage:
          size: 512Mi
    proof-agent:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 256Mi
        storage:
          size: 512Mi
  placement:
    dcloud:
      pricing:
        pomerium:
          denom: uakt
          amount: 1000
        proof-agent:
          denom: uakt
          amount: 1000
        proof-ip:
          denom: uakt
          amount: 10000

deployment:
  pomerium:
    dcloud:
      profile: pomerium
      count: 1
  proof-agent:
    dcloud:
      profile: proof-agent
      count: 1
